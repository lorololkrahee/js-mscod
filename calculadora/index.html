<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Calculadora pré Hexa</h1>
    <div class="numeroseopt">

        <div class="prim">
            <label for="primera">Digite o 1º número: </label>
            <br>
            <input type="text" name="primera" id="primera">
            <br><br>
        </div>

        <div class="seg">
            <label for="segunda">Digite o 2º número: </label>
            <br> 
            <input type="text" name="segunda" id="segunda">
            <br><br>
        </div>
        <div opt>
            <label for="operation">Operação: </label>
            <button id="btnsoma">+</button>
            <button id="btnsub">-</button>
        </div>
    </div>
    <br><br>

    <label for="resultado">Resultado:</label>
    <br>
    <textarea name="resultado" id="resultado" rows="5"></textarea>
    <script src="script.js"></script>

    <p>Só o básico, mas dps implemento mais coisas e mando lá no dc</p>
</body>
</html>
